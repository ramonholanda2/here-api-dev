<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planejamento de rota</title>

  <!-- HERE Maps -->
  <script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-clustering.js"></script>
  <link rel="stylesheet" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css" />


  <!-- Axios (global) -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Seu CSS -->
  <link rel="stylesheet" type="text/css" href="/public/styles.css" />
  <link rel="stylesheet" type="text/css" href="/public/css/toast.css" />
  <link rel="stylesheet" type="text/css" href="/public/css/modalOffices.css" />
  <link rel="stylesheet" type="text/css" href="/public/css/modalEmployees.css" />
  <reference types="heremaps" />
</head>

<body>

  <div class="container">
    <div id="toast-container"></div>
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="header-icon">📋</div>
        <div class="header-content">
          <div class="header-title">Clientes</div>
          <div class="header-info"></div>
        </div>
      </div>


      <form id="filtersPanel" class="filters-panel" method="GET" action="">
        <div id="filtersFields" class="collapsible">
          <div class="filters-grid">
            <!--  <div class="filter-field">
              <label for="f_employee">Employee ID</label>
              <input type="text" id="f_employee" name="employeeID" readonly />
            </div> -->

            <div class="filter-field">
              <label for="f_nome">Nome do cliente</label>
              <input type="text" id="f_nome" name="nome" placeholder="Ex.: Cooperativa" autocomplete="on" />
            </div>

            <div class="filter-field">
              <label for="f_status">Classificação</label>
              <select id="f_status" name="statusCliente">
                <option value="">Todos</option>
                <option value="CRESCENDO">Crescendo</option>
                <option value="ESTAVEL">Estável</option>
                <option value="INATIVO">Inativo</option>
                <option value="QUEDA">Queda</option>
                <option value="SEMVARIACAO">Sem variação</option>
              </select>
            </div>

            <div class="filter-field">
              <label for="f_estado">Estado</label>
              <input type="text" id="f_estado" name="estado" placeholder="Ex.: PR" maxlength="2"
                autocapitalize="characters" />
            </div>

            <div class="filter-field">
              <label for="f_cidade">Cidade</label>
              <input type="text" id="f_cidade" name="cidade" placeholder="Ex.: Curitiba" autocomplete="on" />
            </div>

            <div class="filter-field">
              <label for="f_cnpj">CNPJ</label>
              <input type="text" id="f_cnpj" name="cnpj" placeholder="Ex.: 12.345.678/0001-90" inputmode="numeric"
                autocomplete="on" />
            </div>

            <div class="filter-field">
              <label for="f_idsap">ID SAP</label>
              <input type="text" id="f_idsap" name="idSap" placeholder="Ex.: 10001234" autocomplete="on" />
            </div>

            <div class="filter-field">
              <label for="f_regiao">Região (escritório de vendas)</label>
              <input type="text" id="f_regiao" name="regiao" placeholder="Ex.: Sul" autocomplete="on" />
            </div>

            <div class="filter-field">
              <label for="f_equipe">Equipe de vendas</label>
              <input type="text" id="f_equipe" name="equipeVendas" placeholder="Ex.: Time A" autocomplete="on" />
            </div>


            <!-- <button id="applyFiltersBtn" class="fiori-button filter-btn" type="button">
              🔍 Filtrar
            </button> -->

            <!-- 
              <label for="applyFilter">Filtrar</label>
              <input type="text" id="f_equipe" name="equipeVendas" placeholder="Ex.: Time A" autocomplete="on" /> -->

            <!--  <div class="filter-field">
              <label for="f_pin">Cor do pin</label>
              <select id="f_pin" name="pin">
                <option value="">(manter padrão)</option>
                <option value="vermelho">Vermelho</option>
                <option value="verde">Verde</option>
                <option value="cinza">Cinza</option>
              </select>
            </div> -->
          </div>
        </div>

        <div class="filters-actions">
          <button id="btnToggleSelected" class="fiori-button" type="button" aria-expanded="true"
            aria-controls="filtersPanel" title="Clientes Selecionados">
            Clientes Selecionados
          </button>

          <button id="btnDeselectAll" class="fiori-button" type="button" aria-expanded="true"
            aria-controls="filtersPanel" title="Desmarcar todos">
            Desmarcar todos
          </button>

          <button id="applyFiltersBtn" class="fiori-button filter-btn" type="button">
            🔍 Filtrar
          </button>

          <button id="toggleFiltersBtn" class="fiori-button" type="button" aria-expanded="true"
            aria-controls="filtersPanel" title="Mostrar ou ocultar filtros">
            ⬆️ Ocultar filtros
          </button>

        </div>

      </form>

      <div class="sidebar-content">
        <div id="clientList" class="loading">Carregando clientes...</div>
      </div>

      <!--  <div class="pagination">
        <div>Página 1 de 1</div>
        <div class="pagination-controls">
          <button class="pagination-button" disabled>‹</button>
          <button class="pagination-button" disabled>›</button>
        </div>
      </div> -->
    </div>

    <div id="mapContainer">
      <div class="action-bar">
        <!--  <button id="btnClearRoute" class="fiori-button">✕ Limpar Rota</button>
        <button id="btnOptimizeRoute" class="fiori-button primary">📍 Calcular Rota</button> -->
        <button id="btnOffices" class="btn-primary">Carregando Escritórios...</button>
        <button id="btnOpenFormRoute" class="fiori-button success">➕ Criar Rota</button>
        <button id="btnSelectShape" class="fiori-button warning">🧭 Selecionar forma</button>
        <div id="shapeMenu" class="shape-menu hidden" role="menu" aria-labelledby="btnSelectShape">
          <button id="btnSelectArea" class="shape-option" data-shape="triangle" role="menuitem">🔺 Triângulo</button>
          <button id="btnSelectCircle" class="shape-option" data-shape="circle" role="menuitem">⚪ Círculo</button>
          <button id="btnSelectSquare" class="shape-option" data-shape="square" role="menuitem">⬛ Quadrado</button>
        </div>


      </div>

      <div id="routeInfo" class="route-info">
        <div class="route-info-title">🗺️ Informações da Rota Calculada</div>
        <div class="route-stats">
          <div class="route-stat">
            <div class="route-stat-label">Distância Total</div>
            <div class="route-stat-value" id="routeDistance">-- km</div>
          </div>
          <div class="route-stat">
            <div class="route-stat-label">Tempo Estimado</div>
            <div class="route-stat-value" id="routeDuration">-- min</div>
          </div>
          <div class="route-stat">
            <div class="route-stat-label">Clientes na Rota</div>
            <div class="route-stat-value" id="routeClients">--</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="FormRoute" class="fiori-modal hidden">
    <div class="fiori-modal-content improved-form">
      <div class="modal-header">
        <h2>Nova Rota</h2>
        <button class="close-btn" id="btnCloseForm">✕</button>
      </div>

      <div class="modal-section">
        <div class="form-grid">
          <div class="form-field">
            <label>Nome</label>
            <input type="text" id="routeName" placeholder="Ex: Rota Sul" />
          </div>

          <div class="form-field">
            <label>Tipo</label>
            <select disabled>
              <option>Rota</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-field">
            <label>Data de início</label>
            <input type="date" id="routeDate" />
          </div>

          <div class="form-field">
            <label>Tipo da visita</label>
            <select id="routeTypeVisit">
              <option value="" selected disabled hidden></option>
              <option value="Z01">Visita de rotina</option>
              <option value="Z02">Sábado Azul</option>
              <option value="Z03">Prospecção de novo cliente</option>
              <option value="Z04">Visita de reativação de cliente inativo</option>
              <option value="Z05">Treinamento de produto</option>
              <option value="Z06">Inauguração de loja</option>
              <option value="Z07">Tratativa de reclamação</option>
              <option value="Z08">Visitas Trade Marketing</option>
              <option value="Z09">Visitas às Fábricas (Portas Abertas)</option>
            </select>
          </div>

        </div>

        <!-- <label class="section-label">Dias da semana</label>
        <div class="weekdays-container days-week">
          <label class="weekday-chip"><input type="checkbox">Segunda</label>
          <label class="weekday-chip"><input type="checkbox">Terça</label>
          <label class="weekday-chip"><input type="checkbox">Quarta</label>
          <label class="weekday-chip"><input type="checkbox">Quinta</label>
          <label class="weekday-chip"><input type="checkbox">Sexta</label>
          <label class="weekday-chip"><input type="checkbox">Sábado</label>
          <label class="weekday-chip"><input type="checkbox">Domingo</label>
        </div> -->

        <div class="form-grid">
          <div class="form-field">
            <label>Organizador</label>
            <input id="routeOrganizer" value="" readonly />
          </div>


          <div class="form-field">
            <label>Proprietário</label>
            <div id="routeOwner" class="employee-select" data-id="">
              <span id="routeOwnerName">Carregando...</span>
              <span class="employee-select-icon">▾</span>
            </div>
          </div>


        </div>

        <div class="form-field">
          <label>Notas</label>
          <textarea id="routeNotes" rows="3" placeholder="Observações..."></textarea>
        </div>

        <h3 id="section-title" class="section-title">Clientes selecionados</h3>
        <div class="table-responsive">
          <table class="fiori-table improved-table" id="tableCustomers">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Endereço</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="modal-footer">
          <button class="btn-secondary" id="btnCancelForm">Cancelar</button>
          <button class="btn-primary" id="btnSaveForm">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="LoadingModal" class="sap-loading hidden">
    <div class="sap-spinner"></div>
    <span>Carregando...</span>
  </div>

  <!-- modal sales offices  -->
  <div id="officesModal" class="sap-modal">
    <div class="sap-modal-container">

      <div class="sap-modal-header">
        <span id="officesModalTitle"></span>
        <button class="sap-close-btn closeModal">✕</button>
      </div>

      <div class="sap-modal-content">
        <table id="officesTable" class="sap-table">
          <thead>
            <tr>
              <th style="width:40px;"></th> <!-- checkbox só se selecionável -->
              <th>ID</th>
              <th>Nome</th>
            </tr>
          </thead>
          <tbody>
            <!-- Linhas geradas pelo JS -->
          </tbody>
        </table>
      </div>

      <div class="sap-modal-footer">
        <button id="btnSearchOffices" class="sap-btn sap-btn-primary">Buscar</button>
        <button id="closeModal" class="sap-btn closeModal">Fechar</button>
      </div>

    </div>
  </div>
  <!-- modal sales offices  -->

  <!-- modal employees  -->
  <div id="employeesModal" class="horizon-modal hidden">


    <div class="horizon-modal-content">

      <div class="horizon-modal-header">
        <span>Selecionar empregado</span>
        <button class="horizon-modal-close closeEmployeesModal">✕</button>
      </div>
      <div class="employee-search-container">
        <input type="text" id="employeeSearch" placeholder="Filtrar empregado..." />
      </div>

      <div class="horizon-modal-body">
        <table id="employeesTable" class="horizon-table">
          <thead>
            <tr>
              <th class="employee-name-th">Nome</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="horizon-modal-footer">
        <button class="horizon-btn closeEmployeesModal">Fechar</button>
      </div>

    </div>
  </div>
  <!-- modal employees  -->

  </div>

  <script type="module" src="/public/js/main.js"></script>
</body>

</html>
